name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Matrix entries do the actual work. The `gate` aggregator below is
  # the status check the org's main-branch ruleset keys off of — it
  # requires a check named literally `gate`, which matrix expansion
  # doesn't emit. Hence the trailing aggregator job.
  gate-matrix:
    name: gate-matrix (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.95.0", "stable"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: gate-${{ matrix.toolchain }}

      # Prebuilt binaries from each tool's GitHub release — avoids
      # 5+ minutes of cargo install on every CI run. Stable matrix
      # entry only; the MSRV entry still proves the workspace builds.
      - name: Install prebuilt CLIs (pv + pmat)
        if: matrix.toolchain == 'stable'
        env:
          PV_VERSION: v0.31.2
          PMAT_VERSION: v3.16.0
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/prebuilt-bin"
          mkdir -p "$install_dir"
          for tool_spec in \
            "pv:paiml/aprender:${PV_VERSION}:pv-${PV_VERSION}-x86_64-unknown-linux-gnu" \
            "pmat:paiml/paiml-mcp-agent-toolkit:${PMAT_VERSION}:pmat-${PMAT_VERSION}-x86_64-unknown-linux-gnu"
          do
            IFS=: read -r bin repo ver archive <<< "$tool_spec"
            url="https://github.com/${repo}/releases/download/${ver}/${archive}.tar.gz"
            echo "Downloading $bin from $url"
            curl -sSfL "$url" | tar xz -C "$install_dir"
            mv "$install_dir/$archive/$bin" "$install_dir/$bin"
            chmod +x "$install_dir/$bin"
            "$install_dir/$bin" --version
          done
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Lint compose.yml (docker compose config)
        if: matrix.toolchain == 'stable'
        run: docker compose config --quiet

      - name: Lint contracts (pv)
        if: matrix.toolchain == 'stable'
        run: pv lint contracts/

      - name: pmat comply
        if: matrix.toolchain == 'stable'
        run: pmat comply

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Release build
        run: cargo build --release --workspace

  # Integration smoke: runs the etl_pipeline_dag example end-to-end with
  # both runners and asserts the four runtime contracts. LocalRunner
  # always; ForjarRunner gated behind the `dag-runner/forjar` feature
  # and the published `forjar` CLI being installed beforehand.
  integration:
    name: integration (etl_pipeline_dag, both runners)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration

      - name: Install forjar (used by --features dag-runner/forjar)
        run: |
          cargo install forjar --locked
          forjar --version

      - name: Run etl_pipeline_dag with LocalRunner only (--no-default-features)
        run: cargo run -p dag-cli --example etl_pipeline_dag --no-default-features

      - name: Run etl_pipeline_dag with both runners (default features = forjar)
        run: cargo run -p dag-cli --example etl_pipeline_dag

  # Aggregator. The branch ruleset on `main` requires a status check
  # named exactly `gate`; the matrix above only emits `gate-matrix
  # (toolchain)` rows. This job collapses the matrix + integration into
  # a single check so auto-merge can find it.
  gate:
    name: gate
    needs: [gate-matrix, integration]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.gate-matrix.result }}" != "success" ]; then
            echo "::error::gate-matrix failed (result=${{ needs.gate-matrix.result }})"
            exit 1
          fi
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "::error::integration failed (result=${{ needs.integration.result }})"
            exit 1
          fi
          echo "ok all gates passed"
